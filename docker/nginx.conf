# O serviço `api` no Compose expõe o alias `taskhive.orangepi.local` na rede Docker.
# No browser na LAN usa o mesmo nome (via /etc/hosts ou DNS local) na porta HTTP_PORT (ex. 8080).
server {
    listen 80;
    server_name taskhive.orangepi.local orangepi.local _;

    location / {
        proxy_pass http://taskhive.orangepi.local:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
