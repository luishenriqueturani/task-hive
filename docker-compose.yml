# Task Hive — API + Nginx.
#
# Postgres **opcional** (perfil `bundled-db`):
#   docker compose --profile bundled-db up -d
#
# Só API + Nginx (Postgres já existe noutro host — o teu .env com DB_HOST real):
#   docker compose up -d
#
# Variáveis: copie .env.example para .env e preencha.

services:
  postgres:
    profiles: ['bundled-db']
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - task_hive_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-hive-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Porta fixa; Nginx usa o host api.taskhive.com (alias na rede Docker)
      APP_PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    expose:
      - '3001'
    networks:
      default:
        aliases:
          - api.taskhive.com

  nginx:
    image: nginx:alpine
    container_name: task-hive-nginx
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  task_hive_pg:
