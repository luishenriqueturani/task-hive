# Task Hive — API + Nginx + Postgres opcional (Compose v2: `docker compose`).
#
# Postgres já existe no host (BD no .env):
#   docker compose up -d
#
# Postgres dentro do Docker:
#   docker compose --profile bundled-db up -d
#
# Sem plugin v2 / erro com profiles: docs/docker-compose-legacy.md

services:
  postgres:
    profiles: ['bundled-db']
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - task_hive_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-hive-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      APP_PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    expose:
      - '3001'
    networks:
      default:
        aliases:
          - taskhive.orangepi.local

  nginx:
    image: nginx:alpine
    container_name: task-hive-nginx
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  task_hive_pg:
