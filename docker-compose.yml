# Task Hive — Postgres + API + Nginx (Compose v2: `docker compose up -d`).
#
# A API liga-se ao serviço `postgres` (DB_HOST forçado no compose).
# Utilizadores: superuser (POSTGRES_*), app (DB_*), remoto (DB_REMOTE_*) — ver README e .env.example.

services:
  postgres:
    image: postgres:16-alpine
    container_name: task-hive-postgres
    restart: unless-stopped
    # Só env_file: credenciais vêm do ficheiro tal como o Docker as interpreta (sem sobrescrever
    # com "${VAR}" do Compose, que no host pode ficar vazio e anular o .env).
    env_file: .env
    volumes:
      - task_hive_pg:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '${POSTGRES_PUBLISH_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-hive-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      APP_PORT: '3001'
      # Isto sim tem de vir do Compose: aponta para o serviço na rede Docker (não 127.0.0.1 do host).
      DB_HOST: postgres
      DB_PORT: '5432'
      # DB_USER, DB_PASSWORD, DB_NAME só no env_file — evita substituição "${DB_PASSWORD}" vazia no host.
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3001'
    networks:
      default:
        aliases:
          - taskhive.orangepi.local

  nginx:
    image: nginx:alpine
    container_name: task-hive-nginx
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  task_hive_pg:
