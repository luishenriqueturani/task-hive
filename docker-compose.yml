# Task Hive — API + Nginx (compatível com docker-compose 1.x do apt / CasaOS).
#
# Postgres já existe no host ou na rede: só isto basta:
#   docker-compose up -d
#
# Postgres dentro do Docker (ficheiro extra, ver README):
#   docker-compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# Nota: o comando com espaço "docker compose" é o plugin Compose v2; no Debian/apt
# costuma ser o hífen: "docker-compose".

version: '3.7'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-hive-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      APP_PORT: '3001'
    expose:
      - '3001'
    networks:
      default:
        aliases:
          - api.taskhive.com

  nginx:
    image: nginx:alpine
    container_name: task-hive-nginx
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
