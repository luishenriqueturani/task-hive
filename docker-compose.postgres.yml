# Postgres opcional — combina com docker-compose.yml:
#   docker-compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#
# No .env: DB_HOST=postgres, DB_PORT=5432, e POSTGRES_* alinhados com DB_*.

version: '3.7'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - task_hive_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    depends_on:
      - postgres

volumes:
  task_hive_pg:
